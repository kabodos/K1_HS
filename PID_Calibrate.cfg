[gcode_macro CALIBRAR_TODO_PID]
description: Calibración PID con notificaciones en GuppyScreen y alertas sonoras.
gcode:
    {% set T_EXTRUDER = params.T_EXTRUDER|default(210)|float %}
    {% set T_BED = params.T_BED|default(60)|float %}

    # Inicio del proceso
    SET_DISPLAY_TEXT MSG="Iniciando PID..."
    M117 Preparando ejes...
    G28
    G1 Z50 F3000
    
    # --- CALIBRACIÓN CAMA ---
    SET_DISPLAY_TEXT MSG="Paso 1/2: PID Cama ({T_BED}C)"
    M117 Calibrando Cama...
    M300 S1000 P500                ; Beep de inicio de fase
    PID_CALIBRATE HEATER=heater_bed TARGET={T_BED}
    
    # --- CALIBRACIÓN HOTEND ---
    SET_DISPLAY_TEXT MSG="Paso 2/2: PID Hotend ({T_EXTRUDER}C)"
    M117 Calibrando Hotend...
    M300 S1000 P500                ; Beep de inicio de fase
    M106 S255                      ; Ventilador al máximo
    PID_CALIBRATE HEATER=extruder TARGET={T_EXTRUDER}
    
    # --- FINALIZACIÓN ---
    M106 S0                        ; Apagar ventilador
    G28                            ; Home de seguridad
    SET_DISPLAY_TEXT MSG="¡TERMINADO! Guarda cambios"
    M117 Proceso finalizado.
    
    # Patrón de sonido de éxito (3 beeps rápidos)
    M300 S1500 P100
    M300 S1500 P100
    M300 S2000 P300
    
    {action_respond_info("Calibración completa. USA EL BOTÓN O COMANDO 'SAVE_CONFIG' AHORA.")}
